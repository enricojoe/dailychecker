services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dailychecker
      POSTGRES_USER: dailychecker
      POSTGRES_PASSWORD: dailychecker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dailychecker -d dailychecker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
