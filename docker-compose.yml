services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dailychecker
      POSTGRES_USER: dailychecker
      POSTGRES_PASSWORD: dailychecker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dailychecker -d dailychecker"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Full-stack services (profile "full") ──────────────────────────────────
  # `docker compose up -d`            → starts only db (dev workflow / make db-up)
  # `docker compose --profile full up -d` → starts db + backend + frontend
  backend:
    profiles: ["full"]
    build:
      context: ./backend
    environment:
      APP_ENV: production
      PORT: "8080"
      # Inside the compose network Postgres is reached by service name on 5432.
      DATABASE_URL: postgres://dailychecker:dailychecker@db:5432/dailychecker?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 720h
      TIMEZONE: Asia/Jakarta
      DIGEST_HOUR: "22"
      # The browser loads the SPA from :8081 and calls the API cross-origin.
      CORS_ALLOWED_ORIGINS: http://localhost:8081
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_MODE: ${TELEGRAM_MODE:-polling}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:8081}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    profiles: ["full"]
    build:
      context: ./frontend
      args:
        # Baked into the bundle at build time (Vite inlines VITE_* vars).
        VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  postgres_data:
